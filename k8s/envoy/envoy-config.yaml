apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: gateway
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    tracing:
                      random_sampling:
                        value: 100
                      provider:
                        name: envoy.tracers.opentelemetry
                        typed_config:
                          "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
                          grpc_service:
                            envoy_grpc:
                              cluster_name: otel_collector
                            timeout: 2s
                          service_name: envoy-gateway
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            text_format: "envoy path=%REQ(:PATH)% method=%REQ(:METHOD)% user=%REQ(X-JWT-PAYLOAD)% status=%RESPONSE_CODE% opa=%DYNAMIC_METADATA(envoy.filters.http.ext_authz)%\n"
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: rest-api
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: rest_api
                    http_filters:
                      - name: envoy.filters.http.jwt_authn
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                          providers:
                            keycloak:
                              issuer: "http://localhost:8031/realms/poc"
                              audiences:
                                - poc-client
                              remote_jwks:
                                http_uri:
                                  uri: "http://keycloak.identity.svc.cluster.local:8031/realms/poc/protocol/openid-connect/certs"
                                  cluster: keycloak
                                  timeout: 5s
                                cache_duration:
                                  seconds: 300
                              forward: true
                              forward_payload_header: x-jwt-payload
                          rules:
                            - match:
                                prefix: "/health"
                              requires:
                                allow_missing: {}
                            - match:
                                prefix: "/"
                              requires:
                                provider_name: keycloak
                      - name: envoy.filters.http.ext_authz
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                          transport_api_version: V3
                          failure_mode_allow: false
                          grpc_service:
                            envoy_grpc:
                              cluster_name: opa_ext_authz
                            timeout: 2s
                          include_peer_certificate: false
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: rest_api
          connect_timeout: 2s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: rest_api
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: rest-api.app.svc.cluster.local
                          port_value: 8000
        - name: opa_ext_authz
          connect_timeout: 2s
          type: STRICT_DNS
          http2_protocol_options: {}
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: opa_ext_authz
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: opa.authorization.svc.cluster.local
                          port_value: 9191
        - name: keycloak
          connect_timeout: 2s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: keycloak
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: keycloak.identity.svc.cluster.local
                          port_value: 8031
        - name: otel_collector
          connect_timeout: 2s
          type: STRICT_DNS
          http2_protocol_options: {}
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: otel_collector
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: otel-collector.observability.svc.cluster.local
                          port_value: 4317
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
