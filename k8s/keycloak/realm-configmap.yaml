apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: identity
data:
  poc-realm.json: |
    {
      "realm": "poc",
      "enabled": true,
      "roles": {
        "realm": [
          { "name": "user" },
          { "name": "admin" },
          { "name": "relationship_manager" },
          { "name": "auditor" },
          { "name": "manager" }
        ]
      },
      "clients": [
        {
          "clientId": "poc-client",
          "name": "PoC Client",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "protocol": "openid-connect",
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "protocolMappers": [
            {
              "name": "realm roles as roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "claim.name": "roles",
                "jsonType.label": "String",
                "multivalued": "true",
                "access.token.claim": "true",
                "id.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "customer id",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "config": {
                "user.attribute": "customer_id",
                "claim.name": "customer_id",
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "department",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "config": {
                "user.attribute": "department",
                "claim.name": "department",
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "region",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "config": {
                "user.attribute": "region",
                "claim.name": "region",
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "customer segment",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "config": {
                "user.attribute": "customer_segment",
                "claim.name": "customer_segment",
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "audience poc-client",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.client.audience": "poc-client",
                "access.token.claim": "true",
                "id.token.claim": "false"
              }
            }
          ]
        }
      ],
      "users": [
        {
          "username": "user1",
          "enabled": true,
          "firstName": "User",
          "lastName": "One",
          "email": "user1@example.local",
          "emailVerified": true,
          "requiredActions": [],
          "attributes": {
            "customer_id": ["CUST-001"],
            "department": ["relationship-management"],
            "region": ["GR"],
            "customer_segment": ["corporate"]
          },
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["user", "relationship_manager"]
        },
        {
          "username": "auditor1",
          "enabled": true,
          "firstName": "Auditor",
          "lastName": "One",
          "email": "auditor1@example.local",
          "emailVerified": true,
          "requiredActions": [],
          "attributes": {
            "customer_id": ["AUDITOR"],
            "department": ["audit"],
            "region": ["GR"],
            "customer_segment": ["corporate"]
          },
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["auditor"]
        },
        {
          "username": "manager1",
          "enabled": true,
          "firstName": "Manager",
          "lastName": "One",
          "email": "manager1@example.local",
          "emailVerified": true,
          "requiredActions": [],
          "attributes": {
            "customer_id": ["MANAGER"],
            "department": ["relationship-management"],
            "region": ["GR"],
            "customer_segment": ["corporate"]
          },
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["manager"]
        },
        {
          "username": "admin",
          "enabled": true,
          "firstName": "Admin",
          "lastName": "User",
          "email": "admin@example.local",
          "emailVerified": true,
          "requiredActions": [],
          "attributes": {
            "customer_id": ["ADMIN"]
          },
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["admin"]
        }
      ]
    }
