apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-api
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rest-api
  template:
    metadata:
      labels:
        app: rest-api
    spec:
      containers:
        - name: rest-api
          image: authz-poc-rest-api:latest
          imagePullPolicy: Never
          env:
            - name: OTEL_SERVICE_NAME
              value: rest-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rest-api
  namespace: app
spec:
  selector:
    app: rest-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
